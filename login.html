<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Bus Tracking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="container">
        <div id="login-section" class="glass-card">
            <h1>BusTracker</h1>
            <p class="subtitle">Enter your roll number to track your bus</p>
            
            <div class="input-group">
                <label for="roll-number">Roll Number</label>
                <input type="text" id="roll-number" placeholder="e.g. ES24AD131" autocomplete="off">
            </div>
            
            <button id="login-btn">Sign In</button>
            <p id="login-error" class="hidden" style="color: var(--error); font-size: 0.85rem; margin-top: 12px; text-align: center;">Roll number not found. Please try ES24AD131.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
